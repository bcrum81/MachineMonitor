<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNC Shop Monitor — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f; --surface: #111318; --border: #1e2229; --border2: #2a3040;
    --text: #c8d0dc; --muted: #4a5568; --accent: #00d4ff; --danger: #ff4444;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans);
         min-height: 100vh; display: flex; flex-direction: column;
         align-items: center; justify-content: center; }
  .card { background: var(--surface); border: 1px solid var(--border);
          border-radius: 4px; padding: 36px 40px; width: 360px; }
  .logo-row { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .logo { width: 36px; height: 36px; border: 2px solid var(--accent); border-radius: 3px;
          display: grid; place-items: center; font-family: var(--mono);
          font-size: 11px; font-weight: 600; color: var(--accent); flex-shrink: 0; }
  .title-main { font-size: 15px; font-weight: 500; }
  .title-sub  { font-family: var(--mono); font-size: 10px; color: var(--muted);
                letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .error { background: #1a0808; border: 1px solid var(--danger); color: var(--danger);
           font-family: var(--mono); font-size: 11px; padding: 10px 12px;
           border-radius: 3px; margin-bottom: 16px; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .field label { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .field input { background: var(--bg); border: 1px solid var(--border2); color: var(--text);
                 font-family: var(--mono); font-size: 13px; padding: 10px 12px;
                 border-radius: 3px; outline: none; transition: border-color 0.15s; width: 100%; }
  .field input:focus { border-color: var(--accent); }
  .btn { width: 100%; padding: 11px; background: var(--accent); color: #000; border: none;
         border-radius: 3px; font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
         font-weight: 600; text-transform: uppercase; cursor: pointer; margin-top: 4px;
         transition: background 0.15s; }
  .btn:hover { background: #00bbdd; }
  .back { margin-top: 20px; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .back a { color: var(--accent); text-decoration: none; }
  .back a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo">CNC</div>
    <div>
      <div class="title-main">Shop Monitor</div>
      <div class="title-sub">Admin Login</div>
    </div>
  </div>

  <div class="error" id="error-msg" style="display:none">Invalid username or password.</div>

  <form method="post" action="/login">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" autofocus />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" />
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>

  <div class="back"><a href="/">← Back to machine list</a></div>
</div>
</body>
</html>
